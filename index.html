<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="utf-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Home</title>
      <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700%7CMuli:400,700" rel="stylesheet">
      <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
      <link type="text/css" rel="stylesheet" href="css/app.css" />
   </head>
   <body>
      <header id="header">
      </header>
      <main>
         <div class="container-fluid">
            <div class="row">
               <div class="col-md-12">
                  <div class="jumbotron">
                     <div class="container">
                        <h2>Find any location on the map</h2>
                        <div class="lead">
                           <p>This app make list of your locations and add text/images (title,message,img) to show your content (HTML/Text/Images) in Map marker popup.</p>
                           <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#exampleModal">Add New Location</button>
                           <button type="button" class="btn btn-primary"onclick="callDemoJSON()">Load locations  for Demo (JSON)</button>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
         <div class="container-fluid">
            <div class="row">
               <div class="col-md-3">
                  <div class="sidebar" id="locations">
                     <h3>Locations</h3>
                  </div>
               </div>
               <div class="col-md-9 main-section">
                  <div class="result-map">
                     <div id="map"></div>
                  </div>
               </div>
            </div>
         </div>
         <div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog" role="document">
               <div class="modal-content">
                  <div class="modal-header">
                     <h5 class="modal-title" id="exampleModalLabel">Form</h5>
                     <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                     <span aria-hidden="true">&times;</span>
                     </button>
                  </div>
                  <div class="modal-body">
                     <form class="form-horizontal" action="">
                        <div class="form-group">
                           <label class="control-label col-sm-4" for="Title">Title/Name/Label:</label>
                           <div class="col-sm-8">
                              <input type="text" class="form-control" id="Title" placeholder="Enter Title/Name/Label" name="Title">
                           </div>
                        </div>
                        <div class="form-group">
                           <label class="control-label col-sm-4" for="Address">Address/Popup Message:</label>
                           <div class="col-sm-8">
                              <textarea   class="form-control" id="Address" placeholder="Enter Popup message (Can be HTML for colored text eg: <p style='color:red'>Hi</p>)" name="Address"></textarea>
                           </div>
                        </div>
                        <div class="form-group">
                           <label class="control-label col-sm-4" for="location">location(Lat/long)</label>
                           <div class="col-sm-8">
                              <input type="number" class="form-control" id="Lat"   placeholder="Lat" name="Lat">
                              <input type="number" class="form-control" id="long"   placeholder="long" name="long">
                           </div>
                        </div>
                        <div class="form-group">
                           <label class="control-label col-sm-12 note" for="Address">Note: Above filled Title and Address will be visible in the Map Pointer Popup</label>
                            
                        </div>
                        <div class="form-group">
                           <div class="col-sm-offset-4 col-sm-10">
                              <button type="submit" class="btn btn-default" onclick="formDataSubmit(event)">Submit</button>
                           </div>
                        </div>
                     </form>
                  </div>
                  <div class="modal-footer">
                     <button type="button" class="btn btn-secondary dismiss-modal" data-dismiss="modal">Cancel</button>
                  </div>
               </div>
            </div>
         </div>
      </main>
      <footer id="footer">
         <div class="container">
            <div class="row">
            </div>
         </div>
      </footer>
      <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
      <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
      <script src="http://maps.google.com/maps/api/js?sensor=false"></script>
      <script src="js/app.js"></script>
   </body>
</html>
